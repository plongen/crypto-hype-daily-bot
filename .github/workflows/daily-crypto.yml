name: Crypto Hype Daily

on:
  schedule:
    - cron: '0 10 * * *'   # Todo dia às 10h (horário de Brasília = UTC-3)
  workflow_dispatch:       # Permite rodar manualmente

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install twscrape requests
      
      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
